name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.6

      - name: Find project root
        id: findroot
        run: |
          MATCH=$(find . -maxdepth 3 -name "settings.gradle.kts" | head -n 1)
          if [ -z "$MATCH" ]; then
            echo "settings.gradle.kts bulunamadı! Repo yapısını kontrol et." >&2
            exit 1
          fi
          DIR=$(dirname "$MATCH")
          echo "Proje kökü bulundu: $DIR"
          echo "root=$DIR" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        working-directory: ${{ steps.findroot.outputs.root }}
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-apk
          path: '**/app/build/outputs/apk/debug/app-debug.apk'
